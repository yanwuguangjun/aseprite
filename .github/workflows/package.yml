name: package

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libpixman-1-dev libfreetype6-dev libharfbuzz-dev zlib1g-dev \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev libgl1-mesa-dev \
            libfontconfig1-dev

      - name: Restore Skia cache
        uses: actions/cache@v4
        with:
          path: skia
          key: skia-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('laf/misc/skia-tag.txt') }}
          restore-keys: |
            skia-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Ninja
        uses: aseprite/get-ninja@main

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Skia
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ runner.os }}" == "macOS" ]] ; then
            skia_arch=arm64
          else
            skia_arch=x64
          fi

          if [[ -d "skia/out/Release-$skia_arch" ]] ; then
            exit 0
          fi

          if [[ "${{ runner.os }}" == "Windows" ]] ; then
            this_dir=$(cygpath "${{ github.workspace }}")
          else
            this_dir="${{ github.workspace }}"
          fi

          skia_url=$(bash "$this_dir/laf/misc/skia-url.sh" Release)
          skia_file=$(basename "$skia_url")
          curl --ssl-revoke-best-effort -L -o "$skia_file" "$skia_url"
          rm -rf skia
          unzip -q "$skia_file" -d skia

      - name: Build Aseprite
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ runner.os }}" == "Windows" ]] ; then
            enable_ccache=off
          else
            enable_ccache=on
          fi

          if [[ "${{ runner.os }}" == "macOS" ]] ; then
            skia_arch=arm64
            osx_deployment_target=11.0
          else
            skia_arch=x64
            osx_deployment_target=10.14
          fi

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=$osx_deployment_target \
            -DENABLE_TESTS=OFF \
            -DENABLE_CCACHE=$enable_ccache \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR=$(realpath skia) \
            -DSKIA_LIBRARY_DIR=$(realpath skia/out/Release-$skia_arch)

          cmake --build build --target aseprite

      - name: Package Unix build
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          short_sha="$(git rev-parse --short HEAD)"
          ref_name="${GITHUB_REF_NAME:-$short_sha}"
          safe_ref="$(printf '%s' "$ref_name" | tr '/[:space:]' '--' | tr -cd '[:alnum:]._-')"
          if [[ -z "$safe_ref" ]]; then
            safe_ref="$short_sha"
          fi

          os_name="$(printf '%s' "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')"
          arch_name="$(printf '%s' "$RUNNER_ARCH" | tr '[:upper:]' '[:lower:]')"
          package_name="aseprite-${safe_ref}-${os_name}-${arch_name}"
          package_dir="$RUNNER_TEMP/$package_name"
          archive_path="$RUNNER_TEMP/$package_name.tar.gz"

          mkdir -p "$package_dir"
          cp -a build/bin/. "$package_dir/"
          tar -czf "$archive_path" -C "$RUNNER_TEMP" "$package_name"

          echo "PACKAGE_NAME=$package_name" >> "$GITHUB_ENV"
          echo "PACKAGE_PATH=$archive_path" >> "$GITHUB_ENV"

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $shortSha = (git rev-parse --short HEAD).Trim()
          $refName = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { $shortSha }
          $safeRef = $refName -replace '[^A-Za-z0-9._-]', '-'
          if ([string]::IsNullOrWhiteSpace($safeRef)) {
            $safeRef = $shortSha
          }

          $archName = ($env:RUNNER_ARCH).ToLowerInvariant()
          $packageName = "aseprite-$safeRef-windows-$archName"
          $packageDir = Join-Path $env:RUNNER_TEMP $packageName
          $archivePath = Join-Path $env:RUNNER_TEMP "$packageName.zip"

          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null
          Copy-Item -Path "build/bin/*" -Destination $packageDir -Recurse -Force
          Compress-Archive -Path "$packageDir/*" -DestinationPath $archivePath -Force

          "PACKAGE_NAME=$packageName" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PACKAGE_PATH=$archivePath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: ${{ env.PACKAGE_PATH }}
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PACKAGE_PATH }}
