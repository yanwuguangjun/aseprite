name: package

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libpixman-1-dev libfreetype6-dev libharfbuzz-dev zlib1g-dev \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev libgl1-mesa-dev \
            libfontconfig1-dev

      - name: Set build environment
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "SKIA_ARCH=arm64" >> "$GITHUB_ENV"
            echo "OSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
          else
            echo "SKIA_ARCH=x64" >> "$GITHUB_ENV"
            echo "OSX_DEPLOYMENT_TARGET=10.14" >> "$GITHUB_ENV"
          fi
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "ENABLE_CCACHE=off" >> "$GITHUB_ENV"
          else
            echo "ENABLE_CCACHE=on" >> "$GITHUB_ENV"
          fi

      - name: Restore Skia cache
        uses: actions/cache@v4
        with:
          path: skia
          key: skia-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('laf/misc/skia-tag.txt') }}
          restore-keys: |
            skia-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Ninja
        uses: aseprite/get-ninja@main

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Skia
        shell: bash
        run: |
          set -euo pipefail

          if [[ -d "skia/out/Release-$SKIA_ARCH" ]]; then
            exit 0
          fi

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            this_dir=$(cygpath "${{ github.workspace }}")
          else
            this_dir="${{ github.workspace }}"
          fi

          skia_url=$(bash "$this_dir/laf/misc/skia-url.sh" Release)
          skia_file=$(basename "$skia_url")
          curl --ssl-revoke-best-effort -L -o "$skia_file" "$skia_url"
          rm -rf skia
          unzip -q "$skia_file" -d skia

      - name: Build Aseprite
        shell: bash
        run: |
          set -euo pipefail

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="$OSX_DEPLOYMENT_TARGET" \
            -DENABLE_TESTS=OFF \
            -DENABLE_CCACHE="$ENABLE_CCACHE" \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR=$(realpath skia) \
            -DSKIA_LIBRARY_DIR=$(realpath "skia/out/Release-$SKIA_ARCH")

          cmake --build build --target aseprite

      - name: Sign macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          codesign --force --deep --sign - build/bin/Aseprite.app
          codesign --verify --deep --strict --verbose=2 build/bin/Aseprite.app

      - name: Prepare package metadata
        shell: bash
        run: |
          set -euo pipefail

          short_sha="$(git rev-parse --short HEAD)"
          ref_name="${GITHUB_REF_NAME:-$short_sha}"
          safe_ref="$(printf '%s' "$ref_name" | tr '/[:space:]' '--' | tr -cd '[:alnum:]._-')"
          if [[ -z "$safe_ref" ]]; then
            safe_ref="$short_sha"
          fi

          os_name="$(printf '%s' "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')"
          arch_name="$(printf '%s' "$RUNNER_ARCH" | tr '[:upper:]' '[:lower:]')"
          package_name="aseprite-${safe_ref}-${os_name}-${arch_name}"

          echo "PACKAGE_NAME=$package_name" >> "$GITHUB_ENV"
          echo "PACKAGE_DIR=$RUNNER_TEMP/$package_name" >> "$GITHUB_ENV"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "PACKAGE_PATH=$RUNNER_TEMP/$package_name.zip" >> "$GITHUB_ENV"
          else
            echo "PACKAGE_PATH=$RUNNER_TEMP/$package_name.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Package Unix build
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$PACKAGE_DIR"
          cp -a build/bin/. "$PACKAGE_DIR/"

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            printf '%s\n' \
              'This CI build is ad-hoc signed, but it is not notarized by Apple.' \
              '' \
              'If macOS reports that Aseprite.app is damaged and cannot be opened, remove' \
              'the quarantine attribute after extracting the package:' \
              '' \
              '  xattr -dr com.apple.quarantine Aseprite.app' \
              '  open Aseprite.app' \
              '' \
              'For distribution without this warning, build with an Apple Developer ID' \
              'certificate and notarize the app.' \
              > "$PACKAGE_DIR/README-macOS.txt"
          fi

          tar -czf "$PACKAGE_PATH" -C "$RUNNER_TEMP" "$PACKAGE_NAME"

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path $env:PACKAGE_DIR -Force | Out-Null
          Copy-Item -Path "build/bin/*" -Destination $env:PACKAGE_DIR -Recurse -Force
          Compress-Archive -Path "$env:PACKAGE_DIR/*" -DestinationPath $env:PACKAGE_PATH -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: ${{ env.PACKAGE_PATH }}
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PACKAGE_PATH }}
